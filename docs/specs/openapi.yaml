openapi: 3.1.0
info:
  title: Atlas Control Plane API
  version: 1.3.0
  description: |
    Current HTTP API implemented by atlas/app.py as of 2026-07-01. Workflow and
    trigger request schemas describe the preferred canonical client shape; the
    backend also accepts some shorthand/defaulted fields documented in the guides.
    All API errors use {"error":"message"}. Per-user bearer tokens are required
    by default; ATLAS_API_TOKEN remains a legacy admin token and explicit loopback
    development mode may be exempt.
servers:
  - url: http://127.0.0.1:8787
    description: Default local server
security:
  - bearerAuth: []
  - queryToken: []
tags:
  - name: Identity
  - name: System
  - name: Workers
  - name: Workspaces
  - name: Conversations
  - name: Routing
  - name: Jobs
  - name: Workflows
  - name: Workflow Runs
  - name: Artifacts
  - name: Approvals
  - name: Triggers
  - name: Deliveries
  - name: Audit
  - name: Usage
  - name: Packs
paths:
  /api/auth/login:
    post:
      tags: [Identity]
      operationId: login
      summary: Verify username/password and issue a time-bounded dashboard session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: {type: string}
                password: {type: string, format: password}
      responses:
        '200':
          description: Login token and public user metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: {type: string, writeOnly: true}
                  user: {$ref: '#/components/schemas/User'}
                  session: {$ref: '#/components/schemas/Session'}
        '429': {$ref: '#/components/responses/LoginRateLimited'}
        default: {$ref: '#/components/responses/Error'}

  /api/auth/logout:
    post:
      tags: [Identity]
      operationId: logout
      summary: Revoke the current per-user API token
      responses:
        '200': {description: Logged out}
        default: {$ref: '#/components/responses/Error'}

  /api/me:
    get:
      tags: [Identity]
      operationId: getCurrentUser
      summary: Read the authenticated identity and role
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: {$ref: '#/components/schemas/User'}
                  session: {$ref: '#/components/schemas/Session'}
        default: {$ref: '#/components/responses/Error'}

  /api/users:
    get:
      tags: [Identity]
      operationId: listUsers
      summary: List users (admin only)
      responses:
        '200': {description: User list}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Identity]
      operationId: createUser
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserInput'}
      responses:
        '201': {description: User created}
        default: {$ref: '#/components/responses/Error'}

  /api/users/{user_id}:
    parameters: [{$ref: '#/components/parameters/UserId'}]
    get:
      tags: [Identity]
      operationId: getUser
      summary: Get a user (admin only)
      responses:
        '200': {description: User}
        default: {$ref: '#/components/responses/Error'}
    put:
      tags: [Identity]
      operationId: updateUser
      summary: Update username, password, role, or status (admin only)
      requestBody:
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserInput'}
      responses:
        '200': {description: Updated user}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Identity]
      operationId: deleteUser
      summary: Delete a user and tokens (admin only)
      responses:
        '200': {$ref: '#/components/responses/Deleted'}
        default: {$ref: '#/components/responses/Error'}

  /api/tokens:
    get:
      tags: [Identity]
      operationId: listApiTokens
      summary: List token metadata without token hashes (admin only)
      responses:
        '200': {description: Token metadata list}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Identity]
      operationId: createApiToken
      summary: Issue an API token returned once (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: {type: string}
                username: {type: string}
                name: {type: string}
                expires_at:
                  type: [string, 'null']
                  format: date-time
                  description: Optional future UTC expiry; null or omission makes a non-expiring API token.
      responses:
        '201':
          description: Token metadata and one-time raw api_token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: {$ref: '#/components/schemas/ApiToken'}
                  api_token: {type: string, writeOnly: true}
        default: {$ref: '#/components/responses/Error'}

  /api/tokens/{token_id}:
    parameters: [{$ref: '#/components/parameters/TokenId'}]
    get:
      tags: [Identity]
      operationId: getApiToken
      summary: Get token metadata (admin only)
      responses:
        '200': {description: Token metadata}
        default: {$ref: '#/components/responses/Error'}
    put:
      tags: [Identity]
      operationId: updateApiToken
      summary: Rename a token (admin only)
      responses:
        '200': {description: Updated token metadata}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Identity]
      operationId: revokeApiToken
      summary: Revoke a token (admin only)
      responses:
        '200': {description: Token revoked}
        default: {$ref: '#/components/responses/Error'}

  /api/tokens/{token_id}/revoke:
    parameters: [{$ref: '#/components/parameters/TokenId'}]
    post:
      tags: [Identity]
      operationId: revokeApiTokenAction
      summary: Revoke a token using the additive action alias (admin only)
      responses:
        '200': {description: Token revoked}
        default: {$ref: '#/components/responses/Error'}

  /healthz:
    get:
      tags: [System]
      operationId: getHealthz
      summary: Unauthenticated liveness probe (compose/systemd/Fleet)
      description: Minimal health signal that leaks no internal details (no db path or counts).
      security: []
      responses:
        '200':
          description: Liveness
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, version]
                properties:
                  ok: {type: boolean}
                  service: {type: string}
                  version: {type: string}

  /api/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Read Atlas health and worker count
      responses:
        '200':
          description: Health information
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, db, workers]
                properties:
                  ok: {type: boolean}
                  service: {type: string}
                  db: {type: string}
                  workers: {type: integer}
        default: {$ref: '#/components/responses/Error'}

  /api/workers:
    get:
      tags: [Workers]
      operationId: listWorkers
      summary: List workers without exposing stored tokens
      responses:
        '200':
          description: Worker list
          content:
            application/json:
              schema:
                type: object
                required: [workers]
                properties:
                  workers:
                    type: array
                    items: {$ref: '#/components/schemas/Worker'}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Workers]
      operationId: upsertWorker
      summary: Create or update a worker by id or base_url
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkerInput'}
      responses:
        '201':
          description: Worker saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  worker: {$ref: '#/components/schemas/Worker'}
        default: {$ref: '#/components/responses/Error'}

  /api/workers/poll:
    post:
      tags: [Workers]
      operationId: pollAllWorkers
      summary: Poll health and capabilities for every worker
      responses:
        '200':
          description: Updated workers
          content:
            application/json:
              schema:
                type: object
                properties:
                  workers:
                    type: array
                    items: {$ref: '#/components/schemas/Worker'}
        default: {$ref: '#/components/responses/Error'}

  /api/workers/{worker_id}:
    parameters:
      - {$ref: '#/components/parameters/WorkerId'}
    get:
      tags: [Workers]
      operationId: getWorker
      summary: Get one worker
      responses:
        '200':
          description: Worker
          content:
            application/json:
              schema:
                type: object
                properties:
                  worker: {$ref: '#/components/schemas/Worker'}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Workers]
      operationId: deleteWorker
      summary: Delete a worker and cascade its workspaces
      responses:
        '200': {$ref: '#/components/responses/Deleted'}
        default: {$ref: '#/components/responses/Error'}

  /api/workers/{worker_id}/poll:
    parameters:
      - {$ref: '#/components/parameters/WorkerId'}
    post:
      tags: [Workers]
      operationId: pollWorker
      summary: Poll one worker
      responses:
        '200':
          description: Updated worker
          content:
            application/json:
              schema:
                type: object
                properties:
                  worker: {$ref: '#/components/schemas/Worker'}
        default: {$ref: '#/components/responses/Error'}

  /api/workers/{worker_id}/sync-mode:
    parameters:
      - {$ref: '#/components/parameters/WorkerId'}
    post:
      tags: [Workers]
      operationId: setWorkerSyncMode
      summary: Set a worker's sync trust mode (admin). Enabling tunnel/forward_auth runs a pre-enable sync probe; a failed probe returns 400 and leaves the mode unchanged. Audited (worker.sync_mode_changed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sync_mode]
              properties:
                sync_mode: {type: string, enum: [disabled, tunnel, forward_auth]}
      responses:
        '200':
          description: Updated worker
          content:
            application/json:
              schema:
                type: object
                properties:
                  worker: {$ref: '#/components/schemas/Worker'}
        default: {$ref: '#/components/responses/Error'}

  /api/workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces with worker name/status
      responses:
        '200':
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items: {$ref: '#/components/schemas/Workspace'}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Workspaces]
      operationId: upsertWorkspace
      summary: Create or update a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkspaceInput'}
      responses:
        '201':
          description: Workspace saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace: {$ref: '#/components/schemas/Workspace'}
        default: {$ref: '#/components/responses/Error'}

  /api/workspaces/{workspace_id}:
    parameters:
      - {$ref: '#/components/parameters/WorkspaceId'}
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      summary: Get one workspace
      responses:
        '200':
          description: Workspace
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace: {$ref: '#/components/schemas/Workspace'}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Workspaces]
      operationId: deleteWorkspace
      summary: Delete one workspace
      responses:
        '200': {$ref: '#/components/responses/Deleted'}
        default: {$ref: '#/components/responses/Error'}

  /api/conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      summary: List the 100 most recently updated conversations
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items: {$ref: '#/components/schemas/Conversation'}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Conversations]
      operationId: createConversation
      summary: Create a conversation
      requestBody:
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ConversationInput'}
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation: {$ref: '#/components/schemas/Conversation'}
        default: {$ref: '#/components/responses/Error'}

  /api/routes/resolve:
    post:
      tags: [Routing]
      operationId: resolveRoute
      summary: Preview worker/workspace routing without creating a job
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RouteRequest'}
      responses:
        '200':
          description: Route decision
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RouteResponse'}
        default: {$ref: '#/components/responses/Error'}

  /api/jobs:
    get:
      tags: [Jobs]
      operationId: listJobs
      summary: List jobs newest first
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items: {$ref: '#/components/schemas/Job'}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Jobs]
      operationId: createJob
      summary: Route and start a job
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/JobRequest'}
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job: {$ref: '#/components/schemas/Job'}
        default: {$ref: '#/components/responses/Error'}

  /api/jobs/{job_id}:
    parameters:
      - {$ref: '#/components/parameters/JobId'}
    get:
      tags: [Jobs]
      operationId: getJob
      summary: Get one job
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema:
                type: object
                properties:
                  job: {$ref: '#/components/schemas/Job'}
        default: {$ref: '#/components/responses/Error'}

  /api/jobs/{job_id}/cancel:
    parameters:
      - {$ref: '#/components/parameters/JobId'}
    post:
      tags: [Jobs]
      operationId: cancelJob
      summary: Request best-effort cancellation
      responses:
        '200':
          description: Updated job
          content:
            application/json:
              schema:
                type: object
                properties:
                  job: {$ref: '#/components/schemas/Job'}
        default: {$ref: '#/components/responses/Error'}

  /api/jobs/{job_id}/artifacts:
    parameters:
      - {$ref: '#/components/parameters/JobId'}
    get:
      tags: [Jobs]
      operationId: listJobArtifacts
      summary: List artifacts collected for a job (T9a)
      description: |
        The job's collected `file_ref` artifacts (from `collect_files`). A standalone job's
        collected files are keyed to the job (run_id NULL), so this per-job list surfaces them
        for download; workflow-node jobs also appear under the run's artifacts list.
      responses:
        '200':
          description: Artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts: {type: array, items: {$ref: '#/components/schemas/Artifact'}}
        default: {$ref: '#/components/responses/Error'}

  /api/jobs/{job_id}/events:
    parameters:
      - {$ref: '#/components/parameters/JobId'}
      - name: after
        in: query
        schema: {type: integer, default: 0, minimum: 0}
        description: Replay only events with seq greater than this value
    get:
      tags: [Jobs]
      operationId: streamJobEvents
      summary: Replay and follow job events over Server-Sent Events
      description: |
        SSE frames whose `event` is one of `route`, `session`, `state`, `text`,
        `message`, `error`, `done`, `cancel_requested`, `handoff_*`, `close`, or
        a worker structured event (`thinking`, `user_message_injected`, `usage`,
        `result`, `tool_use_start`, `tool_use_result`, `tool_use_denied`,
        `skill_invoked`, `skill_invoked_result`); unknown worker-defined names may
        also appear. Tool/skill events carry structural metadata only — their
        `data` is projected to `{id, name, status, input_bytes, output_bytes,
        input_sha256, output_sha256}`. `status` is commonly `started`, `ok`,
        `error`, or `denied`, but a worker may report any other value (treat it
        as an open string). The raw tool `input`/`output` is never emitted,
        including on replay of older databases. Atlas sends `retry: 3000` on
        connect and a `: keepalive` comment every 15 seconds while a live job is
        quiet; those transport frames have no event sequence and are not
        persisted timeline events.
      responses:
        '200':
          description: SSE frames with id, event, and JSON data
          content:
            text/event-stream:
              schema: {type: string}
        default: {$ref: '#/components/responses/Error'}

  /api/worker-callbacks/{job_id}:
    parameters:
      - {$ref: '#/components/parameters/JobId'}
    post:
      tags: [Jobs]
      operationId: applyWorkerCallback
      summary: Terminal result delivery for an execution:"callback" job (worker-only)
      security:
        - callbackToken: []
      description: |
        NOT a user endpoint. thClaws delivers the terminal payload of an
        `execution: "callback"` job here, authorized by the per-dispatch signed
        token Atlas minted into the `x_callback.api_key` field (sent back as the
        Bearer value) — user API tokens are neither required nor accepted. The
        route is dispatched before the generic API auth gate as a deliberate,
        documented exception (see docs/specs/threat-model.md): the dedicated
        handler enforces a body-size cap before reading, constant-time HMAC
        verification bound to this job id and an expiry covering the callback
        deadline plus the worker's retry envelope, and audits as the
        `system:worker-callback` actor. Application is idempotent — a duplicate
        delivery, or a delivery racing the deadline reaper, converges to one
        terminal state and answers `200` with `applied: false` so the worker
        stops retrying. Tool payloads are never stored: only tool NAMES and
        counters from the terminal payload are kept (same projection rule as
        streamed tool events).
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkerCallbackPayload'}
      responses:
        '200':
          description: Applied (or already terminal — replay is a no-op)
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied: {type: boolean}
                  state: {enum: [succeeded, failed, cancelled]}
        '401':
          description: Missing, malformed, cross-job, or expired callback token
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '413':
          description: Body exceeds the callback size cap (rejected before reading)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflows:
    get:
      tags: [Workflows]
      operationId: listWorkflows
      summary: List workflow definitions
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
      responses:
        '200':
          description: Workflow definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items: {$ref: '#/components/schemas/WorkflowDefinition'}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Workflows]
      operationId: createWorkflow
      summary: Validate and create a workflow definition
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkflowCreateInput'}
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow: {$ref: '#/components/schemas/WorkflowDefinition'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-templates:
    get:
      tags: [Workflows]
      operationId: listWorkflowTemplates
      summary: List built-in workflow templates
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items: {$ref: '#/components/schemas/WorkflowTemplate'}
        default: {$ref: '#/components/responses/Error'}

  /api/packs:
    get:
      tags: [Packs]
      operationId: listPacks
      summary: List available solution packs shipped under the packs directory
      description: See docs/specs/pack-format.md for the bundle format.
      responses:
        '200':
          description: Pack summaries (invalid bundles include an error field)
          content:
            application/json:
              schema:
                type: object
                properties:
                  packs:
                    type: array
                    items:
                      type: object
                      properties:
                        file: {type: string}
                        name: {type: string}
                        version: {type: string}
                        schema_version: {type: integer}
                        description: {type: string}
                        workflows: {type: integer}
                        triggers: {type: integer}
                        signed: {type: boolean}
                        error: {type: string}
        default: {$ref: '#/components/responses/Error'}

  /api/packs/import:
    post:
      tags: [Packs]
      operationId: importPack
      summary: Validate a pack bundle and create its workflow definitions and triggers
      description: >-
        Additive import. Reuses the workflow graph and trigger validators; an invalid
        bundle (bad node/edge/role/trigger or wrong schema_version) is rejected with a
        clear error. Requires the workflows.manage permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [schema_version, name, version, workflows]
              properties:
                schema_version: {type: integer, enum: [1]}
                name: {type: string, minLength: 1}
                version: {type: string, minLength: 1}
                description: {type: string}
                docs: {type: string}
                roles:
                  type: array
                  items: {type: string, enum: [admin, operator, viewer, auditor]}
                sample_input: {type: object}
                workflows:
                  type: array
                  minItems: 1
                  items: {type: object}
                triggers:
                  type: array
                  items: {type: object}
                signature:
                  type: object
                  nullable: true
                  description: Optional HMAC signature; verified on import when present.
                  properties:
                    algorithm: {type: string, enum: [HMAC-SHA256]}
                    value: {type: string}
      responses:
        '201':
          description: Created definitions and triggers
          content:
            application/json:
              schema:
                type: object
                properties:
                  pack:
                    type: object
                    properties:
                      name: {type: string}
                      version: {type: string}
                  workflows:
                    type: array
                    items: {$ref: '#/components/schemas/WorkflowDefinition'}
                  triggers:
                    type: array
                    items: {$ref: '#/components/schemas/WorkflowTrigger'}
        default: {$ref: '#/components/responses/Error'}

  /api/packs/{workflow_id}/export:
    parameters: [{$ref: '#/components/parameters/WorkflowId'}]
    get:
      tags: [Packs]
      operationId: exportPack
      summary: Serialize one workflow definition (and its triggers) back into a pack bundle
      responses:
        '200':
          description: Pack bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  pack: {type: object}
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/draft:
    post:
      tags: [Workflows]
      operationId: draftWorkflow
      summary: Ask a workflow_builder worker for a validated draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plain_language_prompt]
              properties:
                plain_language_prompt: {type: string, minLength: 1}
      responses:
        '201':
          description: Validated AI draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    $ref: './workflow-ai-draft.schema.json'
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/suggest-workers:
    post:
      tags: [Workflows]
      operationId: suggestWorkflowWorkers
      summary: Suggest real workers/workspaces for unresolved nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [graph]
              properties:
                graph:
                  $ref: './workflow-definition.schema.json#/$defs/graph'
                policy:
                  $ref: './workflow-definition.schema.json#/$defs/policy'
      responses:
        '200':
          description: Suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items: {$ref: '#/components/schemas/WorkerSuggestion'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/{workflow_id}:
    parameters:
      - {$ref: '#/components/parameters/WorkflowId'}
    get:
      tags: [Workflows]
      operationId: getWorkflow
      summary: Get one workflow definition
      responses:
        '200':
          description: Workflow
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow: {$ref: '#/components/schemas/WorkflowDefinition'}
        default: {$ref: '#/components/responses/Error'}
    put:
      tags: [Workflows]
      operationId: updateWorkflow
      summary: Validate and update a workflow definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                description: {type: string}
                version: {type: integer}
                expected_version:
                  type: integer
                  minimum: 1
                  description: Optional optimistic-concurrency precondition. Do not combine with version; a matching save increments version by one, a stale save returns 409.
                status: {type: string}
                graph:
                  $ref: './workflow-definition.schema.json#/$defs/graph'
                policy:
                  oneOf:
                    - $ref: './workflow-definition.schema.json#/$defs/policy'
                    - type: 'null'
                  description: null clears the policy; a cleared policy is treated as {}.
                default_reply:
                  $ref: '#/components/schemas/WorkflowDefaultReply'
      responses:
        '200':
          description: Updated workflow
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow: {$ref: '#/components/schemas/WorkflowDefinition'}
        '409': {$ref: '#/components/responses/Error'}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Workflows]
      operationId: deleteWorkflow
      summary: Delete a workflow definition
      responses:
        '200': {$ref: '#/components/responses/Deleted'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/{workflow_id}/validate:
    parameters:
      - {$ref: '#/components/parameters/WorkflowId'}
    post:
      tags: [Workflows]
      operationId: validateWorkflow
      summary: Validate graph/policy using a saved workflow as fallback
      requestBody:
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkflowPreview'}
      responses:
        '200':
          description: Valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: {type: boolean, const: true}
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/{workflow_id}/explain:
    parameters:
      - {$ref: '#/components/parameters/WorkflowId'}
    post:
      tags: [Workflows]
      operationId: explainWorkflow
      summary: Explain the saved workflow using AI when configured, otherwise locally
      responses:
        '200':
          description: Explanation
          content:
            application/json:
              schema:
                type: object
                properties:
                  explanation: {type: string}
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/{workflow_id}/repair:
    parameters:
      - {$ref: '#/components/parameters/WorkflowId'}
    post:
      tags: [Workflows]
      operationId: repairWorkflow
      summary: Validate or ask the workflow_builder worker for a repaired preview
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                graph:
                  $ref: './workflow-definition.schema.json#/$defs/graph'
                policy:
                  $ref: './workflow-definition.schema.json#/$defs/policy'
                triggers:
                  type: array
                  items: {$ref: '#/components/schemas/TriggerDraft'}
      responses:
        '200':
          description: Repaired or already-valid draft; never auto-saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    $ref: './workflow-ai-draft.schema.json'
        default: {$ref: '#/components/responses/Error'}

  /api/workflows/{workflow_id}/suggest-triggers:
    parameters:
      - {$ref: '#/components/parameters/WorkflowId'}
    post:
      tags: [Workflows]
      operationId: suggestWorkflowTriggers
      summary: Ask the workflow_builder worker for validated trigger drafts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                plain_language_prompt: {type: string}
      responses:
        '200':
          description: Trigger drafts
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggers:
                    type: array
                    items: {$ref: '#/components/schemas/TriggerDraft'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs:
    get:
      tags: [Workflow Runs]
      operationId: listWorkflowRuns
      summary: List workflow runs
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
        - name: workflow_definition_id
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: {$ref: '#/components/schemas/WorkflowRun'}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Workflow Runs]
      operationId: createWorkflowRun
      summary: Start a saved workflow asynchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflow_definition_id]
              properties:
                workflow_definition_id: {type: string, minLength: 1}
                input: {type: object, additionalProperties: true}
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  run: {$ref: '#/components/schemas/WorkflowRun'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}:
    parameters:
      - {$ref: '#/components/parameters/RunId'}
    get:
      tags: [Workflow Runs]
      operationId: getWorkflowRun
      summary: Get run, runtime nodes, traversed edges, and approvals
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  run: {$ref: '#/components/schemas/WorkflowRun'}
                  nodes: {type: array, items: {$ref: '#/components/schemas/RuntimeNode'}}
                  edges: {type: array, items: {$ref: '#/components/schemas/RuntimeEdge'}}
                  approvals: {type: array, items: {$ref: '#/components/schemas/Approval'}}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/artifacts:
    parameters:
      - {$ref: '#/components/parameters/RunId'}
    get:
      tags: [Artifacts]
      operationId: listRunArtifacts
      summary: List artifacts for a run
      responses:
        '200':
          description: Artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts: {type: array, items: {$ref: '#/components/schemas/Artifact'}}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/files:
    parameters:
      - {$ref: '#/components/parameters/RunId'}
      - name: key
        in: query
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z_][A-Za-z0-9_.-]{0,127}$'
      - name: X-Filename
        in: header
        required: false
        schema: {type: string}
      - name: Content-Length
        in: header
        required: true
        schema: {type: integer, minimum: 0}
    post:
      tags: [Artifacts]
      operationId: uploadRunFile
      summary: Upload a direct binary body as a file_ref artifact
      requestBody:
        required: true
        description: >-
          Content-Type is stored as-is on the resulting artifact and is not
          restricted server-side to the media types listed below; any
          Content-Type value is accepted.
        content:
          application/octet-stream:
            schema: {type: string, format: binary}
          application/pdf:
            schema: {type: string, format: binary}
      responses:
        '201':
          description: File artifact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact: {$ref: '#/components/schemas/Artifact'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/events:
    parameters:
      - {$ref: '#/components/parameters/RunId'}
      - name: limit
        in: query
        schema: {type: integer, default: 500, minimum: 1}
      - name: after
        in: query
        description: Return only event sequence numbers greater than this cursor (default 0).
        schema: {type: integer, minimum: 0, default: 0}
    get:
      tags: [Workflow Runs]
      operationId: listWorkflowRunEvents
      summary: List persisted workflow lifecycle events
      responses:
        '200':
          description: Sequence-cursor page of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events: {type: array, items: {$ref: '#/components/schemas/WorkflowEvent'}}
                  after: {type: integer, minimum: 0}
                  next_after: {type: integer, minimum: 0}
                  has_more: {type: boolean}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/pause:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      tags: [Workflow Runs]
      operationId: pauseWorkflowRun
      summary: Pause a running workflow
      responses:
        '200': {$ref: '#/components/responses/RunResponse'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/resume:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      tags: [Workflow Runs]
      operationId: resumeWorkflowRun
      summary: Resume a paused run or authorize recovery retry
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                retry_interrupted: {type: boolean, default: false}
      responses:
        '202': {$ref: '#/components/responses/RunResponse'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/cancel:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      tags: [Workflow Runs]
      operationId: cancelWorkflowRun
      summary: Cancel a non-terminal workflow run
      responses:
        '200': {$ref: '#/components/responses/RunResponse'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-runs/{run_id}/deliver:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      tags: [Deliveries]
      operationId: deliverWorkflowRun
      summary: Manually (re)send the signed result to _meta.reply.callback_url
      description: |
        Requires the run to have already completed and to carry a
        _meta.reply.callback_url; mode need not be "webhook" — a manual
        request overrides the adapter's original poll preference.
      responses:
        '202':
          description: Delivery created and attempted
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery: {$ref: '#/components/schemas/Delivery'}
        default: {$ref: '#/components/responses/Error'}

  /api/artifacts:
    get:
      tags: [Artifacts]
      operationId: listArtifacts
      summary: List artifacts across all runs and jobs (windowed)
      description: >-
        Newest-first display window over every artifact Atlas holds, with optional
        filters. By default rows preserve the legacy `Artifact` shape and include
        `content`. Clients that only need metadata can opt in with
        `include_content=false` or `view=metadata`; then rows use `ArtifactMeta`,
        the `content` property is absent, and the server never reads or serializes
        inline content for the list request. Fetch a single artifact for inline
        content, or its `/content` route for file_ref bytes. The response carries
        `total` (the count matching the filters, from the same database snapshot as
        the rows) so a client can render "latest N of TOTAL" instead of implying the
        window is complete. Consumers that must never be truncated keep using the
        run-scoped and job-scoped artifact routes, which return the full set.
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
        - {name: run_id, in: query, schema: {type: string}}
        - {name: job_id, in: query, schema: {type: string}}
        - {name: key, in: query, schema: {type: string}}
        - name: kind
          in: query
          schema: {type: string, enum: [text, json, markdown, file_ref, summary, decision]}
        - name: include_content
          in: query
          schema: {type: boolean, default: true}
          description: Set to false for metadata-only rows. If view is also supplied, it must be metadata.
        - name: view
          in: query
          schema: {type: string, enum: [full, metadata], default: full}
          description: >-
            Alternative selector: full includes content and metadata omits it. If
            include_content is also supplied, the selectors must agree; conflicting
            or invalid values return 400.
      responses:
        '200':
          description: Windowed artifact listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      oneOf:
                        - {$ref: '#/components/schemas/Artifact'}
                        - {$ref: '#/components/schemas/ArtifactMeta'}
                  total: {type: integer, description: Count of artifacts matching the filters}
                  limit: {type: integer, description: The effective (clamped) window size}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Artifacts]
      operationId: createArtifact
      summary: Create an inline artifact on an existing run
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ArtifactInput'}
      responses:
        '201':
          description: Artifact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact: {$ref: '#/components/schemas/Artifact'}
        default: {$ref: '#/components/responses/Error'}

  /api/artifacts/{artifact_id}:
    parameters: [{$ref: '#/components/parameters/ArtifactId'}]
    get:
      tags: [Artifacts]
      operationId: getArtifact
      summary: Get artifact metadata and inline content
      responses:
        '200':
          description: Artifact
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact: {$ref: '#/components/schemas/Artifact'}
        default: {$ref: '#/components/responses/Error'}

  /api/artifacts/{artifact_id}/content:
    parameters: [{$ref: '#/components/parameters/ArtifactId'}]
    get:
      tags: [Artifacts]
      operationId: downloadArtifactContent
      summary: Download bytes for a file_ref artifact
      responses:
        '200':
          description: Stored file bytes with Content-Disposition attachment
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        default: {$ref: '#/components/responses/Error'}

  /api/approvals:
    get:
      tags: [Approvals]
      operationId: listApprovals
      summary: List approvals with optional filters
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
        - name: state
          in: query
          schema: {type: string}
        - name: run_id
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals: {type: array, items: {$ref: '#/components/schemas/Approval'}}
        default: {$ref: '#/components/responses/Error'}

  /api/approvals/{approval_id}/approve:
    parameters: [{$ref: '#/components/parameters/ApprovalId'}]
    post:
      tags: [Approvals]
      operationId: approveWorkflowGate
      summary: Approve a pending gate without choices
      responses:
        '202': {$ref: '#/components/responses/ApprovalDecision'}
        default: {$ref: '#/components/responses/Error'}

  /api/approvals/{approval_id}/reject:
    parameters: [{$ref: '#/components/parameters/ApprovalId'}]
    post:
      tags: [Approvals]
      operationId: rejectWorkflowGate
      summary: Reject a pending gate and fail the run
      responses:
        '200': {$ref: '#/components/responses/ApprovalDecision'}
        default: {$ref: '#/components/responses/Error'}

  /api/approvals/{approval_id}/choose:
    parameters: [{$ref: '#/components/parameters/ApprovalId'}]
    post:
      tags: [Approvals]
      operationId: chooseWorkflowGateBranch
      summary: Choose a declared branch on a pending gate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [choice]
              properties:
                choice: {type: string, minLength: 1}
      responses:
        '202': {$ref: '#/components/responses/ApprovalDecision'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-triggers:
    get:
      tags: [Triggers]
      operationId: listWorkflowTriggers
      summary: List workflow triggers
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
        - name: workflow_definition_id
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Triggers
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggers: {type: array, items: {$ref: '#/components/schemas/WorkflowTrigger'}}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Triggers]
      operationId: createWorkflowTrigger
      summary: Create a trigger for a saved workflow
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkflowTriggerInput'}
      responses:
        '201':
          description: Trigger created
          content:
            application/json:
              schema:
                type: object
                properties:
                  trigger: {$ref: '#/components/schemas/WorkflowTrigger'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-triggers/{trigger_id}:
    parameters: [{$ref: '#/components/parameters/TriggerId'}]
    get:
      tags: [Triggers]
      operationId: getWorkflowTrigger
      summary: Get one trigger
      responses:
        '200':
          description: Trigger
          content:
            application/json:
              schema:
                type: object
                properties:
                  trigger: {$ref: '#/components/schemas/WorkflowTrigger'}
        default: {$ref: '#/components/responses/Error'}
    put:
      tags: [Triggers]
      operationId: updateWorkflowTrigger
      summary: Update and revalidate a trigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                type: {$ref: '#/components/schemas/TriggerType'}
                config: {type: object, additionalProperties: true}
                enabled: {type: boolean}
      responses:
        '200':
          description: Updated trigger
          content:
            application/json:
              schema:
                type: object
                properties:
                  trigger: {$ref: '#/components/schemas/WorkflowTrigger'}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Triggers]
      operationId: deleteWorkflowTrigger
      summary: Delete a trigger and its events
      responses:
        '200': {$ref: '#/components/responses/Deleted'}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-triggers/{trigger_id}/fire:
    parameters: [{$ref: '#/components/parameters/TriggerId'}]
    post:
      tags: [Triggers]
      operationId: fireWorkflowTrigger
      summary: Fire manual, schedule, or webhook trigger
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload: {type: object, additionalProperties: true}
                dedupe_key: {type: string}
      responses:
        '202':
          description: Trigger event and optionally a started run
          content:
            application/json:
              schema: {type: object, additionalProperties: true}
        default: {$ref: '#/components/responses/Error'}

  /api/workflow-triggers/{trigger_id}/events:
    parameters:
      - {$ref: '#/components/parameters/TriggerId'}
      - name: limit
        in: query
        schema: {type: integer, default: 100, minimum: 1}
    get:
      tags: [Triggers]
      operationId: listWorkflowTriggerEvents
      summary: List trigger delivery/run events
      responses:
        '200':
          description: Trigger events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events: {type: array, items: {$ref: '#/components/schemas/TriggerEvent'}}
        default: {$ref: '#/components/responses/Error'}

  /api/deliveries:
    get:
      tags: [Deliveries]
      operationId: listDeliveries
      summary: List outbound deliveries (operator/auditor)
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
        - name: run_id
          in: query
          schema: {type: string}
        - name: status
          in: query
          schema: {type: string, enum: [pending, delivered, failed, blocked]}
      responses:
        '200':
          description: Deliveries
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries: {type: array, items: {$ref: '#/components/schemas/Delivery'}}
        default: {$ref: '#/components/responses/Error'}

  /api/deliveries/{delivery_id}/retry:
    parameters: [{$ref: '#/components/parameters/DeliveryId'}]
    post:
      tags: [Deliveries]
      operationId: retryDelivery
      summary: One bounded manual (re)attempt of a failed or blocked delivery
      responses:
        '202':
          description: Delivery re-attempted
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery: {$ref: '#/components/schemas/Delivery'}
        default: {$ref: '#/components/responses/Error'}

  /api/audit:
    get:
      tags: [Audit]
      operationId: listAudit
      summary: List or export audit entries newest first
      description: |
        `from`/`to` bound entries by created_at (inclusive; ISO-8601 date or
        timestamp). `format=csv` exports the same rows for compliance hand-off.
      parameters:
        - {$ref: '#/components/parameters/Limit100'}
        - {$ref: '#/components/parameters/UsageFrom'}
        - {$ref: '#/components/parameters/UsageTo'}
        - {$ref: '#/components/parameters/UsageFormat'}
      responses:
        '200':
          description: Audit entries, or an audit CSV
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit: {type: array, items: {$ref: '#/components/schemas/AuditEntry'}}
            text/csv:
              schema: {type: string}
        default: {$ref: '#/components/responses/Error'}

  /api/metrics:
    get:
      tags: [Audit]
      operationId: getMetrics
      summary: Aggregate operational counters for dashboards and Fleet scraping
      description: |
        Counts by state for workers/jobs/workflow runs plus definition, trigger,
        approval, artifact, and usage totals, the schema version, the Atlas
        version, and the server time. Aggregates only — any `read`-role caller
        could already list the underlying items one by one.
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics: {type: object, additionalProperties: true}
        default: {$ref: '#/components/responses/Error'}

  /api/usage:
    get:
      tags: [Usage]
      operationId: listUsage
      summary: Export raw usage events and period totals (admin/auditor only)
      description: |
        Returns the per-instance append-only usage ledger. Date/timestamp bounds
        are inclusive. JSON is the default; CSV returns one row per raw event.
        Atlas exports mediation/CDR source data and does not rate or invoice it.
      parameters:
        - {$ref: '#/components/parameters/UsageFrom'}
        - {$ref: '#/components/parameters/UsageTo'}
        - {$ref: '#/components/parameters/UsageFormat'}
      responses:
        '200':
          description: Usage events and totals, or a raw-event CSV
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UsageResponse'}
            text/csv:
              schema: {type: string}
        default: {$ref: '#/components/responses/Error'}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Per-user API token, or the legacy ATLAS_API_TOKEN, in the Authorization header
    queryToken:
      type: apiKey
      in: query
      name: token
      description: Primarily used by browser EventSource, which cannot set Authorization headers
    callbackToken:
      type: http
      scheme: bearer
      description: |
        Worker-only, per-dispatch signed token (HMAC-SHA256 over the job id and an
        expiry, keyed by ATLAS_SECRET_KEY). Atlas mints it into the x_callback
        api_key at dispatch; thClaws sends it back as the Bearer value when
        delivering the terminal payload. Single-use in effect (job-state
        idempotency), never stored or logged, and only valid for
        POST /api/worker-callbacks/{job_id} on the job it was minted for.

  parameters:
    Limit100:
      name: limit
      in: query
      schema: {type: integer, default: 100, minimum: 1}
    WorkerId: {name: worker_id, in: path, required: true, schema: {type: string}}
    WorkspaceId: {name: workspace_id, in: path, required: true, schema: {type: string}}
    JobId: {name: job_id, in: path, required: true, schema: {type: string}}
    WorkflowId: {name: workflow_id, in: path, required: true, schema: {type: string}}
    RunId: {name: run_id, in: path, required: true, schema: {type: string}}
    ArtifactId: {name: artifact_id, in: path, required: true, schema: {type: string}}
    ApprovalId: {name: approval_id, in: path, required: true, schema: {type: string}}
    TriggerId: {name: trigger_id, in: path, required: true, schema: {type: string}}
    DeliveryId: {name: delivery_id, in: path, required: true, schema: {type: string}}
    UserId: {name: user_id, in: path, required: true, schema: {type: string}}
    TokenId: {name: token_id, in: path, required: true, schema: {type: string}}
    UsageFrom:
      name: from
      in: query
      description: Inclusive ISO 8601 date or timestamp
      schema: {type: string}
    UsageTo:
      name: to
      in: query
      description: Inclusive ISO 8601 date or timestamp
      schema: {type: string}
    UsageFormat:
      name: format
      in: query
      schema: {type: string, enum: [json, csv], default: json}

  responses:
    Error:
      description: Error response; normally 400, 401, 403, 404, 405, 429, or 500. Unsupported methods include an Allow header.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Deleted:
      description: Resource deleted
      content:
        application/json:
          schema:
            type: object
            required: [deleted]
            properties:
              deleted: {type: boolean, const: true}
    LoginRateLimited:
      description: Login attempts exceeded the in-memory per-username-and-peer-IP limit.
      headers:
        Retry-After:
          schema: {type: integer, minimum: 1}
          description: Seconds until another login attempt may be made.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    RunResponse:
      description: Updated workflow run
      content:
        application/json:
          schema:
            type: object
            properties:
              run: {$ref: '#/components/schemas/WorkflowRun'}
    ApprovalDecision:
      description: Approval and updated run
      content:
        application/json:
          schema:
            type: object
            properties:
              approval: {$ref: '#/components/schemas/Approval'}
              run: {$ref: '#/components/schemas/WorkflowRun'}

  schemas:
    UsageEvent:
      type: object
      required: [id, idempotency_key, kind, units, created_at, metadata]
      properties:
        id: {type: string}
        idempotency_key: {type: string}
        run_id: {type: [string, 'null']}
        job_id: {type: [string, 'null']}
        node_key: {type: [string, 'null']}
        worker_id: {type: [string, 'null']}
        actor: {type: [string, 'null']}
        kind: {type: string, enum: [job, workflow_run, token, worker_active, inference_tokens, gpu_seconds], description: "job/workflow_run are emitted by Atlas core today; inference_tokens/gpu_seconds are the managed-inference gateway meters (see managed-inference.md); token/worker_active are reserved."}
        status: {type: [string, 'null']}
        units: {type: integer}
        seconds: {type: [number, 'null']}
        started_at: {type: [string, 'null'], format: date-time}
        finished_at: {type: [string, 'null'], format: date-time}
        model: {type: [string, 'null'], description: Visibility only under BYOK}
        tokens_prompt: {type: [integer, 'null'], description: Visibility only under BYOK}
        tokens_output: {type: [integer, 'null'], description: Visibility only under BYOK}
        created_at: {type: string, format: date-time}
        metadata: {type: object, additionalProperties: true}

    UsageTotals:
      type: object
      required: [workflow_runs, successful_workflow_runs, jobs, budget_units, wall_seconds, job_wall_seconds, tokens_prompt, tokens_output, estimated_cost_usd]
      properties:
        workflow_runs: {type: integer}
        successful_workflow_runs: {type: integer}
        jobs: {type: integer}
        budget_units: {type: integer}
        wall_seconds: {type: number}
        job_wall_seconds: {type: number}
        tokens_prompt: {type: integer, description: Sum of worker-reported prompt tokens across job events; 0 when no worker reported usage}
        tokens_output: {type: integer, description: Sum of worker-reported output tokens across job events; 0 when no worker reported usage}
        estimated_cost_usd: {type: number, minimum: 0, description: Sum of immutable per-event USD estimates; visibility only, not billable}

    UsageResponse:
      type: object
      required: [usage, totals, from, to]
      properties:
        usage: {type: array, items: {$ref: '#/components/schemas/UsageEvent'}}
        totals: {$ref: '#/components/schemas/UsageTotals'}
        from: {type: [string, 'null'], format: date-time}
        to: {type: [string, 'null'], format: date-time}

    User:
      type: object
      required: [username, role, status]
      properties:
        id: {type: [string, 'null']}
        username: {type: string}
        role: {type: string, enum: [admin, operator, viewer, auditor]}
        status: {type: string, enum: [active, disabled]}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        token_count: {type: integer}

    UserInput:
      type: object
      properties:
        username: {type: string}
        password: {type: string, format: password}
        role: {type: string, enum: [admin, operator, viewer, auditor]}
        status: {type: string, enum: [active, disabled]}

    Session:
      type: object
      required: [token_id, expires_at]
      properties:
        token_id: {type: string, description: Public token metadata identifier, not the bearer secret.}
        expires_at: {type: string, format: date-time}

    ApiToken:
      type: object
      required: [id, user_id, name, purpose, created_at]
      properties:
        id: {type: string}
        user_id: {type: string}
        username: {type: string}
        name: {type: string}
        purpose: {type: string, enum: [api, session], description: Immutable token lifecycle class.}
        expires_at: {type: [string, 'null'], format: date-time}
        last_used_at: {type: [string, 'null'], format: date-time}
        created_at: {type: string, format: date-time}
        revoked_at: {type: [string, 'null'], format: date-time}

    Error:
      type: object
      required: [error]
      properties:
        error: {type: string}

    WorkerInput:
      type: object
      required: [base_url]
      properties:
        id: {type: string}
        name: {type: string}
        base_url: {type: string, minLength: 1}
        token: {type: string, description: Blank retains the existing token on upsert}
        role: {type: string}
        tags:
          oneOf:
            - {type: string, description: Comma-separated tags}
            - {type: array, items: {type: string}}
      additionalProperties: true

    Worker:
      type: object
      required: [id, name, base_url, status, token_set]
      properties:
        id: {type: string}
        name: {type: string}
        base_url: {type: string}
        role: {type: string}
        tags: {type: array, items: {type: string}}
        status: {type: string}
        token_set: {type: boolean}
        sync_mode: {type: string, enum: [disabled, tunnel, forward_auth], description: 'T4 operator-owned sync trust assertion; default disabled. Gates /workspace/sync/* use.'}
        last_seen_at: {type: [string, 'null'], format: date-time}
        agent_info: {type: object, additionalProperties: true, description: 'Poll-owned snapshot; may include advisory busy (bool|null) + busy_checked_at when sync_mode != disabled.'}
        last_error: {type: [string, 'null']}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    WorkspaceInput:
      type: object
      required: [worker_id, workspace_key, workspace_dir]
      properties:
        id: {type: string}
        worker_id: {type: string}
        workspace_key: {type: string}
        workspace_dir: {type: string}
        company: {type: string}
        tags:
          oneOf:
            - {type: string}
            - {type: array, items: {type: string}}
      additionalProperties: true

    Workspace:
      allOf:
        - {$ref: '#/components/schemas/WorkspaceInput'}
        - type: object
          required: [id, created_at, updated_at]
          properties:
            worker_name: {type: string}
            worker_status: {type: string}
            created_at: {type: string, format: date-time}
            updated_at: {type: string, format: date-time}
          additionalProperties: true

    ConversationInput:
      type: object
      properties:
        id: {type: string}
        title: {type: string}
        preferred_worker_id: {type: string}
        preferred_workspace_id: {type: string}
        workspace_key: {type: string}
        company: {type: string}
        metadata: {type: object, additionalProperties: true}
      additionalProperties: true

    Conversation:
      allOf:
        - {$ref: '#/components/schemas/ConversationInput'}
        - type: object
          required: [id, title, created_at, updated_at]
          properties:
            created_at: {type: string, format: date-time}
            updated_at: {type: string, format: date-time}
          additionalProperties: true

    RouteHints:
      type: object
      properties:
        conversation_id: {type: string}
        worker_id: {type: string}
        workspace_id: {type: string}
        workspace_key: {type: string}
        company: {type: string}
        role: {type: string}
        tags:
          oneOf:
            - {type: string}
            - {type: array, items: {type: string}}
        prompt: {type: string}
        allowed_worker_ids: {type: array, items: {type: string}}
        allowed_workspace_ids: {type: array, items: {type: string}}
      additionalProperties: true

    RouteRequest:
      allOf:
        - {$ref: '#/components/schemas/RouteHints'}

    RouteResponse:
      type: object
      required: [worker, reason]
      properties:
        worker: {$ref: '#/components/schemas/Worker'}
        workspace:
          oneOf:
            - {$ref: '#/components/schemas/Workspace'}
            - {type: 'null'}
        reason: {type: string}
        thclaws_session_id: {type: [string, 'null']}

    HandoffInput:
      type: object
      required: [enabled]
      properties:
        enabled: {type: boolean}
        worker_id: {type: string}
        workspace_id: {type: string}
        prompt: {type: string}

    JobRequest:
      type: object
      required: [prompt]
      properties:
        prompt: {type: string, minLength: 1}
        conversation_id: {type: string}
        worker_id: {type: string}
        workspace_id: {type: string}
        workspace_key: {type: string}
        company: {type: string}
        role: {type: string}
        tags:
          oneOf:
            - {type: string}
            - {type: array, items: {type: string}}
        model: {type: string}
        parent_job_id: {type: string}
        allowed_worker_ids: {type: array, items: {type: string}}
        allowed_workspace_ids: {type: array, items: {type: string}}
        handoff: {$ref: '#/components/schemas/HandoffInput'}
        execution:
          enum: [stream, callback]
          default: stream
          description: |
            "callback" runs the job fire-and-forget: the worker 202-ACKs, runs
            independently of Atlas's connection, and POSTs the terminal payload
            to /api/worker-callbacks/{job_id}. Requires ATLAS_PUBLIC_BASE_URL and
            ATLAS_SECRET_KEY on the server, else the request is rejected with 400.
            Jobs that never call back are failed by a reaper after
            ATLAS_CALLBACK_TIMEOUT_SECONDS.
        collect_files:
          type: array
          items: {type: string}
          description: |
            T9a frozen Job Artifacts: bounded thClaws glob patterns forwarded to
            /agent/run on stream and execution:"callback". After successful worker
            completion Atlas reads the Bearer-authenticated frozen session manifest
            and snapshots, verifies safe unique ids/paths, 256-file/300-MiB caps,
            skipped[], x-sha256, exact length, and local SHA-256, then publishes
            file_ref artifacts all-or-nothing before succeeded. Collection is
            failure-isolated and never calls workspace sync or consults sync_mode.
            An empty manifest is valid; absent collect_files makes no Artifact API
            request. Patterns must be bounded relative glob strings.
      additionalProperties: true

    Job:
      type: object
      required: [id, worker_id, state, prompt, assistant_text, created_at, updated_at]
      properties:
        id: {type: string}
        conversation_id: {type: [string, 'null']}
        worker_id: {type: string}
        workspace_id: {type: [string, 'null']}
        parent_job_id: {type: [string, 'null']}
        state: {enum: [queued, running, cancel_requested, succeeded, failed, cancelled]}
        prompt: {type: string}
        model: {type: string}
        route_reason: {type: string}
        thclaws_session_id: {type: [string, 'null']}
        assistant_text: {type: string}
        error: {type: [string, 'null']}
        cancel_requested: {type: [integer, boolean]}
        handoff_worker_id: {type: [string, 'null']}
        handoff_workspace_id: {type: [string, 'null']}
        handoff_prompt: {type: string}
        handoff_job_id: {type: [string, 'null']}
        handoff_error: {type: [string, 'null']}
        execution: {enum: [stream, callback]}
        callback_deadline_at:
          type: [string, 'null']
          format: date-time
          description: For execution:"callback" jobs, when the reaper fails a job that never called back; null on stream jobs
        collect_files:
          type: [array, 'null']
          items: {type: string}
          description: T9a bounded glob patterns forwarded to thClaws Job Artifacts (see JobCreate.collect_files); null when no collection is requested
        created_at: {type: string, format: date-time}
        started_at: {type: [string, 'null'], format: date-time}
        finished_at: {type: [string, 'null'], format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    WorkerCallbackPayload:
      type: object
      description: |
        thClaws's terminal CallbackPayload wire shape (stable upstream; additive
        fields possible). Atlas applies it tolerantly: status maps to the job
        state ("succeeded"/"cancelled" as-is, anything else fails the job with
        error.message), summary becomes assistant_text, usage token counts feed
        the metering ledger (same tolerant rules as the streamed usage event),
        and tool NAMES/counters are kept as a structural callback_result job
        event — tool input/output never exists in this shape and is never stored.
      required: [run_id, status]
      properties:
        run_id: {type: string, description: Equals the Atlas job id}
        status: {enum: [succeeded, failed, cancelled]}
        finish_reason: {type: string, description: stop | length | tool_calls | error}
        model: {type: string}
        summary: {type: string, description: Final assistant text; may be empty}
        usage:
          type: object
          properties:
            prompt_tokens: {type: integer, minimum: 0}
            completion_tokens: {type: integer, minimum: 0}
            total_tokens: {type: integer, minimum: 0}
            cached_input_tokens: {type: integer, minimum: 0}
            cache_creation_input_tokens: {type: integer, minimum: 0}
            reasoning_output_tokens: {type: integer, minimum: 0}
        tool_calls: {type: array, items: {type: string}, description: Names of executed tools}
        tool_denials: {type: array, items: {type: string}}
        iterations: {type: integer, minimum: 0}
        error:
          type: [object, 'null']
          properties:
            code: {type: string}
            message: {type: string}
        started_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time}
      additionalProperties: true

    WorkflowDefinition:
      type: object
      required: [id, name, description, graph, policy, version, status]
      properties:
        id: {type: string}
        name: {type: string}
        description: {type: string}
        version: {type: integer}
        status: {type: string}
        graph:
          $ref: './workflow-definition.schema.json#/$defs/graph'
        policy:
          oneOf:
            - $ref: './workflow-definition.schema.json#/$defs/policy'
            - type: 'null'
          description: null after an explicit PUT clear; treated as {}.
        default_reply:
          $ref: '#/components/schemas/WorkflowDefaultReply'
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    WorkflowCreateInput:
      type: object
      required: [graph]
      properties:
        id: {type: string}
        name: {type: string, default: Untitled workflow}
        description: {type: string}
        version: {type: integer, minimum: 1, default: 1}
        status: {type: string, default: draft}
        graph:
          $ref: './workflow-definition.schema.json#/$defs/graph'
        policy:
          $ref: './workflow-definition.schema.json#/$defs/policy'
        default_reply:
          $ref: '#/components/schemas/WorkflowDefaultReply'
      additionalProperties: true

    WorkflowTemplate:
      type: object
      required: [id, name, description, graph, policy]
      properties:
        id: {type: string}
        name: {type: string}
        description: {type: string}
        graph:
          $ref: './workflow-definition.schema.json#/$defs/graph'
        policy:
          $ref: './workflow-definition.schema.json#/$defs/policy'
      additionalProperties: true

    WorkflowDefaultReply:
      type: [object, 'null']
      description: Optional reply copied into input._meta.reply for new runs unless that run supplies input._meta.reply.
      properties:
        mode: {enum: [webhook, none], default: none}
        callback_url: {type: [string, 'null'], minLength: 1}
        correlation_id: {type: string}
      additionalProperties: true

    WorkflowPreview:
      type: object
      properties:
        graph:
          $ref: './workflow-definition.schema.json#/$defs/graph'
        policy:
          $ref: './workflow-definition.schema.json#/$defs/policy'

    WorkerSuggestion:
      type: object
      required: [node_id, role, reason, state]
      properties:
        node_id: {type: string}
        role: {type: string}
        worker_id: {type: string}
        workspace_id: {type: string}
        reason: {type: string}
        state: {enum: [matched, fallback, unavailable]}

    WorkflowRun:
      type: object
      required: [id, name, state, input, current_nodes, counters]
      properties:
        id: {type: string}
        workflow_definition_id: {type: [string, 'null']}
        name: {type: string}
        state: {enum: [queued, running, paused, waiting_for_human, recovery_required, succeeded, failed, cancelled]}
        input: {type: object, additionalProperties: true}
        current_nodes: {type: array, items: {type: string}}
        counters: {type: object, additionalProperties: true}
        error: {type: [string, 'null']}
        created_at: {type: string, format: date-time}
        started_at: {type: [string, 'null'], format: date-time}
        finished_at: {type: [string, 'null'], format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    RuntimeNode:
      type: object
      properties:
        id: {type: string}
        run_id: {type: string}
        node_key: {type: string}
        state: {type: string}
        job_id: {type: [string, 'null']}
        attempt: {type: integer}
        input_artifacts: {type: array, items: {type: string}}
        output_artifacts: {type: array, items: {type: string}}
        error: {type: [string, 'null']}
      additionalProperties: true

    RuntimeEdge:
      type: object
      properties:
        id: {type: string}
        run_id: {type: string}
        from_node: {type: string}
        to_node: {type: string}
        condition_result: {type: object, additionalProperties: true}
        created_at: {type: string, format: date-time}
      additionalProperties: true

    WorkflowEvent:
      type: object
      properties:
        id: {type: integer}
        run_id: {type: string}
        seq: {type: integer}
        event_type: {type: string}
        node_key: {type: [string, 'null']}
        payload: {type: object, additionalProperties: true}
        created_at: {type: string, format: date-time}
      additionalProperties: true

    ArtifactInput:
      type: object
      required: [run_id, key]
      properties:
        id: {type: string}
        run_id: {type: string}
        job_id: {type: string}
        key: {type: string, minLength: 1}
        kind: {enum: [text, json, markdown, file_ref, summary, decision], default: text}
        content: {}
        metadata: {type: object, additionalProperties: true}
        classification: {enum: [public, internal, confidential, secret]}
      additionalProperties: false

    Artifact:
      type: object
      required: [id, key, kind, content, metadata]
      properties:
        id: {type: string}
        run_id: {type: [string, 'null']}
        job_id: {type: [string, 'null']}
        key: {type: string}
        kind: {enum: [text, json, markdown, file_ref, summary, decision]}
        content: {}
        metadata: {type: object, additionalProperties: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    ArtifactMeta:
      type: object
      description: >-
        Artifact row without its content: what the metadata-only global listing
        opt-in returns. `content` is intentionally absent (not null) — the server
        never reads it for a metadata-only list request.
      not:
        required: [content]
      required: [id, key, kind, metadata]
      properties:
        id: {type: string}
        run_id: {type: [string, 'null']}
        job_id: {type: [string, 'null']}
        key: {type: string}
        kind: {enum: [text, json, markdown, file_ref, summary, decision]}
        metadata: {type: object, additionalProperties: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    Approval:
      type: object
      properties:
        id: {type: string}
        run_id: {type: string}
        workflow_node_id: {type: [string, 'null']}
        node_key: {type: string}
        approval_key: {type: string}
        label: {type: string}
        reason: {type: string}
        choices:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              label: {type: string}
        selected_choice: {type: [string, 'null']}
        state: {type: string}
        created_at: {type: string, format: date-time}
        decided_at: {type: [string, 'null'], format: date-time}
        updated_at: {type: string, format: date-time}
      additionalProperties: true

    TriggerType:
      enum: [manual, schedule, webhook, workflow_run_completed, artifact_created, worker_status_changed]

    TriggerDraft:
      type: object
      properties:
        name: {type: string}
        type: {$ref: '#/components/schemas/TriggerType'}
        config: {type: object, additionalProperties: true}
        enabled: {type: boolean}
      additionalProperties: false

    WorkflowTriggerInput:
      type: object
      required: [workflow_definition_id]
      properties:
        workflow_definition_id: {type: string, minLength: 1}
        name: {type: string}
        type: {$ref: '#/components/schemas/TriggerType'}
        config: {type: object, additionalProperties: true}
        enabled: {type: boolean}
      additionalProperties: true

    WorkflowTrigger:
      allOf:
        - {$ref: '#/components/schemas/WorkflowTriggerInput'}
        - type: object
          required: [id, name, type, config, enabled, created_at, updated_at]
          properties:
            id: {type: string}
            last_fired_at: {type: [string, 'null'], format: date-time}
            next_fire_at: {type: [string, 'null'], format: date-time}
            last_event_state: {type: [string, 'null']}
            last_event_error: {type: [string, 'null']}
            last_event_at: {type: [string, 'null'], format: date-time}
            created_at: {type: string, format: date-time}
            updated_at: {type: string, format: date-time}
          additionalProperties: true

    TriggerEvent:
      type: object
      properties:
        id: {type: string}
        trigger_id: {type: string}
        run_id: {type: [string, 'null']}
        payload: {type: object, additionalProperties: true}
        state: {type: string}
        error: {type: [string, 'null']}
        dedupe_key: {type: [string, 'null']}
        created_at: {type: string, format: date-time}
      additionalProperties: true

    Delivery:
      type: object
      required: [id, run_id, url, status, attempts, max_attempts, created_at, updated_at]
      properties:
        id: {type: string}
        run_id: {type: string}
        url: {type: string}
        correlation_id: {type: [string, 'null']}
        status: {type: string, enum: [pending, delivered, failed, blocked]}
        attempts: {type: integer}
        max_attempts: {type: integer}
        last_error: {type: [string, 'null']}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        delivered_at: {type: [string, 'null'], format: date-time}
      additionalProperties: true

    AuditEntry:
      type: object
      properties:
        id: {type: integer}
        action: {type: string}
